name: Blade Prettier

on:
  pull_request:
    branches:
      - 'dev'
      - 'master'
      - 'bug-fix'
    paths:
      - '.github/workflows/blade-prettier.yml'
      - 'resources/views/**'
      - 'package.json'
      - 'package-lock.json'

jobs:
  prettier:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Install dependency
        run: npm install

      - name: Get changed Blade files
        id: changed-files
        run: |
          BASE_SHA=${{ github.event.pull_request.base.sha }}
          CHANGED_FILES=$(git diff --name-only $BASE_SHA HEAD -- '*.blade.php' 'resources/views/**' | tr '\n' ' ')
          echo "files=$CHANGED_FILES" >> $GITHUB_OUTPUT

      - name: Prettier Blade
        run: |
          CHANGED_FILES="${{ steps.changed-files.outputs.files }}"
          if [ -n "$CHANGED_FILES" ]; then
            echo "$CHANGED_FILES" | xargs npx prettier --write
          else
            echo "No Blade files to format"
          fi

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "Blade Prettier Code"
